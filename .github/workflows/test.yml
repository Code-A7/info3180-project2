name: Test Suite

on:
  push:
    branches: [main, develop, master]
  pull_request:
  workflow_dispatch:

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']
        test-group: [1, 2, 3, 4]
        exclude:
          - python-version: '3.10'
            test-group: 3
          - python-version: '3.10'
            test-group: 4
          - python-version: '3.12'
            test-group: 3
          - python-version: '3.12'
            test-group: 4

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('**/requirements*.txt', '**/pyproject.toml') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-xdist pytest-timeout

      - name: Create instance directory
        run: mkdir -p instance

      - name: Run tests (Group ${{ matrix.test-group }})
        run: |
          case ${{ matrix.test-group }} in
            1) TEST_PATTERN="test_auth|test_seed|test_utils" ;;
            2) TEST_PATTERN="test_profile|test_upload" ;;
            3) TEST_PATTERN="test_likes|test_matches|test_notifications" ;;
            4) TEST_PATTERN="test_integration|test_messaging|test_search" ;;
          esac
          pytest tests/ -v --tb=short -k "$TEST_PATTERN" --timeout=60

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.python-version }}-group-${{ matrix.test-group }}
          path: |
            test-results/
            .pytest_cache/
          retention-days: 14

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: driftdater_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio

      - name: Create instance directory
        run: mkdir -p instance

      - name: Run integration tests
        env:
          SQLALCHEMY_DATABASE_URI: postgresql://test:test@localhost:5432/driftdater_test
        run: |
          pytest tests/test_integration.py -v --tb=short

  e2e-tests:
    name: End-to-End Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install frontend dependencies
        run: |
          npm ci

      - name: Install backend dependencies
        run: |
          python -m pip install -r requirements.txt

      - name: Create instance directory
        run: mkdir -p instance

      - name: Run backend tests
        run: |
          pytest tests/ -v --tb=short -x

      - name: Build frontend
        run: |
          npm run build

  benchmark:
    name: Performance Benchmark
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-benchmark

      - name: Create instance directory
        run: mkdir -p instance

      - name: Run benchmarks
        run: |
          pytest tests/ --benchmark-only --benchmark-autosave

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: .benchmarks/
          retention-days: 30

  coverage:
    name: Coverage Report
    runs-on: ubuntu-latest
    needs: [unit-tests]
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Create instance directory
        run: mkdir -p instance

      - name: Generate coverage report
        run: |
          pytest tests/ --cov=app --cov-report=xml --cov-report=html -v

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: unittests
          fail_ci_if_error: false

      - name: Add coverage comment to PR
        uses: romeovs/lcov-reporter-action@v0.3.1
        if: github.event_name == 'pull_request'
        with:
          lcov-file: ./coverage/lcov.info
          github-token: ${{ secrets.GITHUB_TOKEN }}
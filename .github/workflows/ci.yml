name: Test Suite

on:
  push:
    branches: [main, develop, master]
  pull_request:
  workflow_dispatch:

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']
        test-group: [1, 2, 3, 4]
        exclude:
          - python-version: '3.10'
            test-group: 3
          - python-version: '3.10'
            test-group: 4
          - python-version: '3.12'
            test-group: 3
          - python-version: '3.12'
            test-group: 4

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-xdist pytest-timeout

      - name: Create instance and results directory
        run: mkdir -p instance test-results

      - name: Run tests (Group ${{ matrix.test-group }})
        run: |
          case ${{ matrix.test-group }} in
            1) TEST_FILES="tests/test_auth.py tests/test_seed.py tests/test_utils.py" ;;
            2) TEST_FILES="tests/test_profile.py tests/test_views_utils.py" ;;
            3) TEST_FILES="tests/test_likes.py tests/test_matches.py tests/test_notifications.py" ;;
            4) TEST_FILES="tests/test_messaging.py tests/test_search.py tests/test_integration.py" ;;
          esac
          pytest -v --tb=short --timeout=60 $TEST_FILES

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-${{ matrix.python-version }}-group-${{ matrix.test-group }}
          path: |
            test-results/
            .pytest_cache/
          retention-days: 14

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio pytest-timeout

      - name: Create instance directory
        run: mkdir -p instance

      - name: Run integration tests with SQLite
        env:
          SQLALCHEMY_DATABASE_URI: sqlite:///instance/test.db
        run: |
          pytest tests/test_integration.py -v --tb=short --timeout=120

      - name: Upload integration test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: integration-test-results
          path: |
            .pytest_cache/
          retention-days: 7

  e2e-tests:
    name: End-to-End Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Cache Node.js modules
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install frontend dependencies
        run: npm ci

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-timeout

      - name: Create instance and results directory
        run: mkdir -p instance test-results

      - name: Build frontend
        run: npm run build

      - name: Run backend smoke tests
        run: |
          pytest tests/test_auth.py tests/test_profile.py tests/test_matches.py -v --tb=short -x --timeout=60

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Playwright E2E tests
        run: npm run test:e2e

      - name: Upload Playwright results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 14

      - name: Upload test-results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-test-results
          path: |
            .pytest_cache/
          retention-days: 7

  frontend-tests:
    name: Frontend Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest with coverage
        run: npm run test:coverage

      - name: Upload Vitest coverage
        uses: actions/upload-artifact@v7
        with:
          name: vitest-coverage
          path: coverage/
          retention-days: 7

  benchmark:
    name: Performance Benchmark
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-benchmark

      - name: Create instance directory
        run: mkdir -p instance

      - name: Run benchmarks
        run: |
          pytest tests/ --benchmark-only --benchmark-autosave

      - name: Upload benchmark results
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-results
          path: .benchmarks/
          retention-days: 30

  coverage:
    name: Coverage Report
    runs-on: ubuntu-latest
    needs: [unit-tests, frontend-tests]
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Create instance directory
        run: mkdir -p instance

      - name: Generate backend coverage report
        run: |
          pytest tests/ --cov=app --cov-report=xml --cov-report=html -v

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      - name: Generate frontend coverage report
        run: npm run test:coverage || true

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage.xml,coverage/coverage-final.json
          flags: unittests
          fail_ci_if_error: false

      - name: Add coverage comment to PR
        if: github.event_name == 'pull_request'
        uses: romeovs/lcov-reporter-action@v0.4.0
        with:
          lcov-files: |
            ./coverage/lcov.info
            coverage/lcov.info
          github-token: ${{ secrets.GITHUB_TOKEN }}

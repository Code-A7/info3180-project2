services:
  # Backend Service - Flask + Socket.IO
  - type: web
    name: datingapp-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -k eventlet -w 1 --bind 0.0.0.0:$PORT run:app
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: SQLALCHEMY_DATABASE_URI
        fromDatabase:
          name: datingapp-db
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: UPLOAD_FOLDER
        value: ./uploads
      - key: MAILTRAP_SMTP_HOST
        value: sandbox.smtp.mailtrap.io
      - key: MAILTRAP_SMTP_PORT
        value: "2525"
      - key: CORS_ORIGINS
        value: "https://datingapp-frontend.onrender.com,http://localhost:3000"
    autoDeploy: true
    region: ohio

  # Frontend Service - Vue.js
  - type: web
    name: datingapp-frontend
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npx serve -s dist -l $PORT
    envVars:
      - key: VITE_API_URL
        value: https://datingapp-backend.onrender.com
      - key: VITE_WS_URL
        value: wss://datingapp-backend.onrender.com
    autoDeploy: true
    region: ohio

databases:
  - name: datingapp-db
    plan: free
    region: ohio
